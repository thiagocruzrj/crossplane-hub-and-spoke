apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: crossplane-hub-and-spoke
  annotations:
    meta.crossplane.io/maintainer: thagocruz@gmail.com
    meta.crossplane.io/source: github.com/thago/crossplane-hub-and-spoke
    meta.crossplane.io/description: >
      Hub-and-spoke network platform for AWS (Transit Gateway),
      Azure (VNet Peering), and GCP (VPC Peering) built with Crossplane.
spec:
  crossplane:
    version: ">=v2.0.0-0"
  dependsOn:
    - provider: xpkg.upbound.io/upbound/provider-family-aws
      version: ">=v1.14.0"
    - provider: xpkg.upbound.io/upbound/provider-aws-ec2
      version: ">=v1.14.0"
    - provider: xpkg.upbound.io/upbound/provider-family-azure
      version: ">=v1.9.0"
    - provider: xpkg.upbound.io/upbound/provider-azure-network
      version: ">=v1.9.0"
    - provider: xpkg.upbound.io/upbound/provider-family-gcp
      version: ">=v1.8.0"
    - provider: xpkg.upbound.io/upbound/provider-gcp-compute
      version: ">=v1.8.0"
    - function: xpkg.upbound.io/crossplane-contrib/function-patch-and-transform
      version: ">=v0.6.0"
