# Create a service principal and secret:
#   az ad sp create-for-rbac --sdk-auth --role Contributor \
#     --scopes /subscriptions/<SUBSCRIPTION_ID> > /tmp/azure-creds.json
#   kubectl create secret generic azure-creds \
#     --from-file=credentials=/tmp/azure-creds.json \
#     --namespace crossplane-system
#
# Then apply:
#   kubectl apply -f cluster/config/providerconfig-azure.yaml

---
apiVersion: azure.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: azure-provider
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: azure-creds
      key: credentials
